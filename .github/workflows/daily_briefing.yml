name: Daily AI Briefing

on:
  # 3×/day cron is designed but NOT enabled yet — we'll flip this on once the
  # deja-vu prompt + image fallback have been validated on a manual run.
  # Planned crons when we enable (measured cost 2026-04-24: $1.01/run × 3 ≈ $91/mo):
  #   - cron: '0 6 * * *'   # 09:00 IL — main morning
  #   - cron: '0 12 * * *'  # 15:00 IL — midday update
  #   - cron: '0 18 * * *'  # 21:00 IL — evening update
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'merge-only'

jobs:
  briefing:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Skip the entire pipeline when a recent local subscription run already
      # produced today's outputs. Honors a 5-hour freshness window: if the
      # marker's completed_at is within 5h of NOW, the daily run is redundant
      # (user covered it locally on Claude Max). Outside the window → run as
      # usual so the briefing doesn't go stale.
      - name: Check for recent local subscription run
        id: skip_check
        run: |
          DATE=$(date -u +'%Y-%m-%d')
          MARKER="merger-agent/output/${DATE}/.via_subscription.done"
          WINDOW_SECONDS=$((5 * 3600))
          if [ ! -f "$MARKER" ]; then
            echo "no marker for $DATE — proceeding"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          COMPLETED_AT=$(python3 -c "import json,sys; print(json.load(open('$MARKER'))['completed_at'])")
          AGE_SECONDS=$(python3 -c "
          from datetime import datetime
          completed = datetime.fromisoformat('$COMPLETED_AT')
          # Treat as local time if naive (run.py writes naive ISO); compare against now
          now = datetime.now() if completed.tzinfo is None else datetime.now(completed.tzinfo)
          print(int((now - completed).total_seconds()))
          ")
          if [ "$AGE_SECONDS" -le "$WINDOW_SECONDS" ]; then
            HOURS=$((AGE_SECONDS / 3600))
            echo "marker $MARKER is ${HOURS}h old — within 5h window. SKIPPING."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "marker $MARKER is older than 5h — proceeding"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.skip_check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            adk-news-agent/requirements.txt
            perplexity-news-agent/requirements.txt
            tavily-news-agent/requirements.txt

      - name: Install dependencies
        if: steps.skip_check.outputs.skip != 'true'
        run: |
          pip install \
            -r adk-news-agent/requirements.txt \
            -r perplexity-news-agent/requirements.txt \
            -r tavily-news-agent/requirements.txt \
            -r merger-agent/requirements.txt \
            -r rss-news-agent/requirements.txt \
            -r twitter-agent/requirements.txt \
            firecrawl-py exa-py newsapi-python || true

      - name: Run all pipelines
        if: steps.skip_check.outputs.skip != 'true'
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GOOGLE_GENAI_MODEL: gemini-2.5-flash
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TAVILY_API_KEY2: ${{ secrets.TAVILY_API_KEY2 }}
          TAVILY_API_KEY3: ${{ secrets.TAVILY_API_KEY3 }}
          RSS_WRITER_MODEL: claude-haiku-4-5-20251001
          RSS_TRANSLATOR_MODEL: claude-haiku-4-5-20251001
          TAVILY_WRITER_MODEL: claude-haiku-4-5-20251001
          TAVILY_TRANSLATOR_MODEL: claude-haiku-4-5-20251001
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          JINA_API_KEY2: ${{ secrets.JINA_API_KEY2 }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          EXA_API_KEY2: ${{ secrets.EXA_API_KEY2 }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          NEWSAPI_KEY2: ${{ secrets.NEWSAPI_KEY2 }}
          TWITTER_AUTH_TOKEN: ${{ secrets.TWITTER_AUTH_TOKEN }}
          TWITTER_CT0: ${{ secrets.TWITTER_CT0 }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          MERGER_WRITER_MODEL: claude-sonnet-4-6
          MERGER_TRANSLATOR_MODEL: claude-sonnet-4-6
          LOOKBACK_DAYS: 3
        run: |
          MODE="${{ inputs.mode || 'all' }}"
          if [ "$MODE" = "merge-only" ]; then
            python run_all.py --merge-only
          else
            python run_all.py --skip xai  # xai disabled (cost); twitter agent is free replacement
          fi

      - name: Publish latest merged HTML to GH Pages + per-day archive
        if: steps.skip_check.outputs.skip != 'true'
        run: |
          mkdir -p docs docs/report
          DATE=$(date +'%Y-%m-%d')
          LATEST=$(ls -t merger-agent/output/**/*.html 2>/dev/null | head -1)
          if [ -z "$LATEST" ]; then
            echo "No merged output found"; exit 1
          fi
          # docs/index.html = today's raw merged briefing. Standalone, readable, no CloudFront
          # dependency — serves as a data backup if the Next.js app ever breaks.
          cp "$LATEST" docs/index.html
          # Per-day archive preserves old briefings so /report/2026-04-24.html etc. stay accessible
          # even after tomorrow's run overwrites docs/index.html.
          cp "$LATEST" "docs/report/${DATE}.html"
          cp "$LATEST" "docs/report/latest.html"
          echo "Wrote docs/index.html + docs/report/${DATE}.html + docs/report/latest.html"

      - name: Publish combined data JSON to docs/data/ (for Lambda ingestion)
        if: steps.skip_check.outputs.skip != 'true'
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: python3 publish_data.py

      - name: Persist fallback events to docs/data/
        if: steps.skip_check.outputs.skip != 'true'
        run: |
          mkdir -p docs/data
          DATE=$(date +'%Y-%m-%d')
          if [ -f /tmp/_fallbacks.jsonl ]; then
            cp /tmp/_fallbacks.jsonl "docs/data/_fallbacks_${DATE}.jsonl"
            echo "Persisted $(wc -l < /tmp/_fallbacks.jsonl) fallback events"
          else
            # Write empty so the file exists for the email step to reference
            : > "docs/data/_fallbacks_${DATE}.jsonl"
            echo "No fallback events this run"
          fi

      - name: Commit and push outputs
        if: steps.skip_check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f docs/ merger-agent/output/ perplexity-news-agent/output/ rss-news-agent/output/ tavily-news-agent/output/ adk-news-agent/output/ article-reader-agent/output/ exa-news-agent/output/ newsapi-agent/output/ youtube-news-agent/output/ github-trending-agent/output/ twitter-agent/output/
          git diff --staged --quiet || git commit -m "briefing: $(date +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase -X ours
          git push

      - name: Send email
        if: steps.skip_check.outputs.skip != 'true'
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_ADMIN_API_KEY: ${{ secrets.ANTHROPIC_ADMIN_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TAVILY_API_KEY2: ${{ secrets.TAVILY_API_KEY2 }}
          TAVILY_API_KEY3: ${{ secrets.TAVILY_API_KEY3 }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          EXA_API_KEY2: ${{ secrets.EXA_API_KEY2 }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          NEWSAPI_KEY2: ${{ secrets.NEWSAPI_KEY2 }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          JINA_API_KEY2: ${{ secrets.JINA_API_KEY2 }}
          DASHBOARD_MTD_JSON: ${{ secrets.DASHBOARD_MTD_JSON }}
        run: python send_email.py
