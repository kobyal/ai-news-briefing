<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="40" height="40" rx="8" fill="url(#bg2)"/>
  <!--
    OPTION 2: Analysis Prism
    A geometric prism/diamond shape with three diverging lines
    emerging from the right — like light refracting through a prism.
    Metaphor: AI takes raw information (single input) and breaks it
    into clear insights (multiple outputs). Think Pink Floyd meets Stripe.
  -->
  <!-- Prism triangle -->
  <polygon points="10,30 18,8 26,30" fill="none" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Three diverging analysis beams emerging from the right face -->
  <line x1="22" y1="15" x2="33" y2="10" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="23" y1="19" x2="34" y2="19" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
  <line x1="24" y1="23" x2="33" y2="28" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <!-- Small dot accents at beam endpoints -->
  <circle cx="33" cy="10" r="1.5" fill="white"/>
  <circle cx="34" cy="19" r="1.5" fill="white" opacity="0.85"/>
  <circle cx="33" cy="28" r="1.5" fill="white" opacity="0.7"/>
</svg>