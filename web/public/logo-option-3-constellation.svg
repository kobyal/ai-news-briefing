<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="40" height="40" rx="8" fill="url(#bg3)"/>
  <!--
    OPTION 3: Constellation / Network Eye
    Nodes connected by thin lines forming an abstract eye/lens shape.
    The central node is prominent — the "focus" of AI analysis.
    Outer nodes form a lens/eye contour — intelligence + vision.
    Evokes: connected data points, AI network, focused analysis.
  -->
  <!-- Connection lines (drawn first, behind nodes) -->
  <!-- Upper arc connections -->
  <line x1="8" y1="20" x2="15" y2="12" stroke="white" stroke-width="1.2" opacity="0.5"/>
  <line x1="15" y1="12" x2="20" y2="10" stroke="white" stroke-width="1.2" opacity="0.5"/>
  <line x1="20" y1="10" x2="25" y2="12" stroke="white" stroke-width="1.2" opacity="0.5"/>
  <line x1="25" y1="12" x2="32" y2="20" stroke="white" stroke-width="1.2" opacity="0.5"/>
  <!-- Lower arc connections -->
  <line x1="8" y1="20" x2="15" y2="28" stroke="white" stroke-width="1.2" opacity="0.5"/>
  <line x1="15" y1="28" x2="20" y2="30" stroke="white" stroke-width="1.2" opacity="0.5"/>
  <line x1="20" y1="30" x2="25" y2="28" stroke="white" stroke-width="1.2" opacity="0.5"/>
  <line x1="25" y1="28" x2="32" y2="20" stroke="white" stroke-width="1.2" opacity="0.5"/>
  <!-- Cross connections to center -->
  <line x1="15" y1="12" x2="20" y2="20" stroke="white" stroke-width="1.2" opacity="0.4"/>
  <line x1="25" y1="12" x2="20" y2="20" stroke="white" stroke-width="1.2" opacity="0.4"/>
  <line x1="15" y1="28" x2="20" y2="20" stroke="white" stroke-width="1.2" opacity="0.4"/>
  <line x1="25" y1="28" x2="20" y2="20" stroke="white" stroke-width="1.2" opacity="0.4"/>
  <line x1="8" y1="20" x2="20" y2="20" stroke="white" stroke-width="1.2" opacity="0.4"/>
  <line x1="32" y1="20" x2="20" y2="20" stroke="white" stroke-width="1.2" opacity="0.4"/>
  <!-- Nodes: outer ring (eye/lens shape) -->
  <circle cx="8" cy="20" r="2" fill="white" opacity="0.7"/>
  <circle cx="15" cy="12" r="1.8" fill="white" opacity="0.8"/>
  <circle cx="20" cy="10" r="1.8" fill="white" opacity="0.8"/>
  <circle cx="25" cy="12" r="1.8" fill="white" opacity="0.8"/>
  <circle cx="32" cy="20" r="2" fill="white" opacity="0.7"/>
  <circle cx="15" cy="28" r="1.8" fill="white" opacity="0.8"/>
  <circle cx="20" cy="30" r="1.8" fill="white" opacity="0.8"/>
  <circle cx="25" cy="28" r="1.8" fill="white" opacity="0.8"/>
  <!-- Central focal node — larger, full opacity -->
  <circle cx="20" cy="20" r="3.5" fill="white"/>
</svg>