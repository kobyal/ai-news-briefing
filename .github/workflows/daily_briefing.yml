name: Daily AI Briefing

on:
  schedule:
    - cron: '12 3 * * *'   # ~6:12am Israel time (UTC+3 summer)
    - cron: '12 15 * * *'  # ~6:12pm Israel time (UTC+3 summer)
  workflow_dispatch:        # manual trigger from GitHub UI

jobs:
  briefing:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            adk-news-agent/requirements.txt
            perplexity-news-agent/requirements.txt
            tavily-news-agent/requirements.txt
            social-news-agent/requirements.txt

      - name: Install dependencies
        run: |
          pip install \
            -r adk-news-agent/requirements.txt \
            -r perplexity-news-agent/requirements.txt \
            -r tavily-news-agent/requirements.txt \
            -r social-news-agent/requirements.txt \
            -r merger-agent/requirements.txt \
            -r rss-news-agent/requirements.txt \
            firecrawl-py exa-py newsapi-python || true

      - name: Run all pipelines
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GOOGLE_GENAI_MODEL: gemini-2.5-flash
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TAVILY_API_KEY2: ${{ secrets.TAVILY_API_KEY2 }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
          SOCIAL_SEARCH_MODEL: sonar
          SOCIAL_WRITER_MODEL: anthropic/claude-sonnet-4-6
          SOCIAL_TRANSLATOR_MODEL: anthropic/claude-haiku-4-5
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          MERGER_WRITER_MODEL: claude-sonnet-4-20250514
          MERGER_TRANSLATOR_MODEL: claude-sonnet-4-20250514
          LOOKBACK_DAYS: 3
        run: python run_all.py

      - name: Copy latest merged output to docs/index.html (GitHub Pages)
        run: |
          mkdir -p docs
          LATEST=$(ls -t merger-agent/output/**/*.html 2>/dev/null | head -1)
          if [ -n "$LATEST" ]; then
            cp "$LATEST" docs/index.html
            echo "Copied $LATEST → docs/index.html"
          else
            echo "No merged output found"
            exit 1
          fi

      - name: Publish combined data JSON to docs/data/ (for Lambda ingestion)
        run: python3 publish_data.py

      - name: Commit and push outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f docs/ merger-agent/output/ perplexity-news-agent/output/ rss-news-agent/output/ tavily-news-agent/output/ adk-news-agent/output/ social-news-agent/output/ article-reader-agent/output/ exa-news-agent/output/ newsapi-agent/output/ youtube-news-agent/output/ github-trending-agent/output/ xai-twitter-agent/output/
          git diff --staged --quiet || git commit -m "briefing: $(date +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase -X ours
          git push

      - name: Trigger Lambda ingest to DynamoDB
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          pip install -q boto3
          python3 -c "
          import boto3, json
          from datetime import datetime
          date = datetime.utcnow().strftime('%Y-%m-%d')
          client = boto3.client('lambda', region_name='us-east-1')
          resp = client.invoke(FunctionName='ai-news-ingest', Payload=json.dumps({'date': date}))
          result = json.loads(resp['Payload'].read())
          print(f'Ingest result: {result}')
          "

      - name: Send email
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python send_email.py
