<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="40" height="40" rx="8" fill="url(#bg1)"/>
  <!--
    OPTION 1: Bold "A" monogram with integrated signal pulse
    A strong geometric A letterform with a horizontal crossbar
    that transforms into a signal/pulse wave — suggesting
    "AI" + "intelligence signal"
  -->
  <!-- Main A shape: two bold diagonal strokes -->
  <polygon points="20,7 9,33 14,33 20,18 26,33 31,33" fill="white"/>
  <!-- Signal pulse crossbar replacing the normal A crossbar -->
  <!-- This zigzag line cuts across the A, evoking a radar pulse / heartbeat -->
  <polyline
    points="11,25 14.5,25 16,22 18,28 20,21 22,28 24,22 25.5,25 29,25"
    fill="none"
    stroke="url(#bg1)"
    stroke-width="2.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>