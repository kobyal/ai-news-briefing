name: Daily AI Briefing

on:
  # 3×/day cron is designed but NOT enabled yet — we'll flip this on once the
  # deja-vu prompt + image fallback have been validated on a manual run.
  # Planned crons when we enable (measured cost 2026-04-24: $1.01/run × 3 ≈ $91/mo):
  #   - cron: '0 6 * * *'   # 09:00 IL — main morning
  #   - cron: '0 12 * * *'  # 15:00 IL — midday update
  #   - cron: '0 18 * * *'  # 21:00 IL — evening update
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'merge-only'

jobs:
  briefing:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            adk-news-agent/requirements.txt
            perplexity-news-agent/requirements.txt
            tavily-news-agent/requirements.txt

      - name: Install dependencies
        run: |
          pip install \
            -r adk-news-agent/requirements.txt \
            -r perplexity-news-agent/requirements.txt \
            -r tavily-news-agent/requirements.txt \
            -r merger-agent/requirements.txt \
            -r rss-news-agent/requirements.txt \
            -r twitter-agent/requirements.txt \
            firecrawl-py exa-py newsapi-python || true

      - name: Run all pipelines
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GOOGLE_GENAI_MODEL: gemini-2.5-flash
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TAVILY_API_KEY2: ${{ secrets.TAVILY_API_KEY2 }}
          TAVILY_API_KEY3: ${{ secrets.TAVILY_API_KEY3 }}
          RSS_WRITER_MODEL: claude-haiku-4-5-20251001
          RSS_TRANSLATOR_MODEL: claude-haiku-4-5-20251001
          TAVILY_WRITER_MODEL: claude-haiku-4-5-20251001
          TAVILY_TRANSLATOR_MODEL: claude-haiku-4-5-20251001
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          JINA_API_KEY2: ${{ secrets.JINA_API_KEY2 }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          EXA_API_KEY2: ${{ secrets.EXA_API_KEY2 }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          NEWSAPI_KEY2: ${{ secrets.NEWSAPI_KEY2 }}
          TWITTER_AUTH_TOKEN: ${{ secrets.TWITTER_AUTH_TOKEN }}
          TWITTER_CT0: ${{ secrets.TWITTER_CT0 }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          MERGER_WRITER_MODEL: claude-sonnet-4-6
          MERGER_TRANSLATOR_MODEL: claude-sonnet-4-6
          LOOKBACK_DAYS: 3
        run: |
          MODE="${{ inputs.mode || 'all' }}"
          if [ "$MODE" = "merge-only" ]; then
            python run_all.py --merge-only
          else
            python run_all.py --skip xai  # xai disabled (cost); twitter agent is free replacement
          fi

      - name: Archive raw merged HTML + write GH Pages redirect to CloudFront
        run: |
          mkdir -p docs docs/report
          DATE=$(date +'%Y-%m-%d')
          LATEST=$(ls -t merger-agent/output/**/*.html 2>/dev/null | head -1)
          if [ -z "$LATEST" ]; then
            echo "No merged output found"; exit 1
          fi
          # Archive the raw merged HTML per-day — linked from the email as "raw report" fallback.
          cp "$LATEST" "docs/report/${DATE}.html"
          cp "$LATEST" "docs/report/latest.html"
          # docs/index.html is a redirect to the full Next.js app on CloudFront. Previously we
          # copied the raw merger HTML here, which drifted out of sync with the richer /community,
          # /stories, /github, /media routes on CloudFront.
          cat > docs/index.html <<'EOF'
          <!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=https://duus0s1bicxag.cloudfront.net/">
          <title>AI Daily Briefing</title>
          <link rel="canonical" href="https://duus0s1bicxag.cloudfront.net/">
          </head><body>
          <p>Redirecting to <a href="https://duus0s1bicxag.cloudfront.net/">the full briefing</a>.</p>
          <p>Raw report: <a href="./report/latest.html">latest</a></p>
          </body></html>
          EOF
          echo "Wrote docs/index.html (redirect) + docs/report/${DATE}.html + docs/report/latest.html"

      - name: Publish combined data JSON to docs/data/ (for Lambda ingestion)
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: python3 publish_data.py

      - name: Persist fallback events to docs/data/
        run: |
          mkdir -p docs/data
          DATE=$(date +'%Y-%m-%d')
          if [ -f /tmp/_fallbacks.jsonl ]; then
            cp /tmp/_fallbacks.jsonl "docs/data/_fallbacks_${DATE}.jsonl"
            echo "Persisted $(wc -l < /tmp/_fallbacks.jsonl) fallback events"
          else
            # Write empty so the file exists for the email step to reference
            : > "docs/data/_fallbacks_${DATE}.jsonl"
            echo "No fallback events this run"
          fi

      - name: Commit and push outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f docs/ merger-agent/output/ perplexity-news-agent/output/ rss-news-agent/output/ tavily-news-agent/output/ adk-news-agent/output/ article-reader-agent/output/ exa-news-agent/output/ newsapi-agent/output/ youtube-news-agent/output/ github-trending-agent/output/ twitter-agent/output/
          git diff --staged --quiet || git commit -m "briefing: $(date +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase -X ours
          git push

      - name: Send email
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_ADMIN_API_KEY: ${{ secrets.ANTHROPIC_ADMIN_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TAVILY_API_KEY2: ${{ secrets.TAVILY_API_KEY2 }}
          TAVILY_API_KEY3: ${{ secrets.TAVILY_API_KEY3 }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          EXA_API_KEY2: ${{ secrets.EXA_API_KEY2 }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          NEWSAPI_KEY2: ${{ secrets.NEWSAPI_KEY2 }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          JINA_API_KEY2: ${{ secrets.JINA_API_KEY2 }}
          DASHBOARD_MTD_JSON: ${{ secrets.DASHBOARD_MTD_JSON }}
        run: python send_email.py
